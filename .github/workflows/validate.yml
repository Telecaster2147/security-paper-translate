name: validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile scripts
        run: python -m py_compile scripts/*.py
      - name: Validate SKILL.md frontmatter
        run: |
          python - <<'PY'
          from pathlib import Path
          import re, sys
          p = Path('SKILL.md')
          text = p.read_text(encoding='utf-8')
          m = re.match(r'^---\n(.*?)\n---\n', text, re.S)
          if not m:
              raise SystemExit('SKILL.md missing YAML frontmatter')
          front = m.group(1)
          if not re.search(r'^name:\s*security-paper-translate\s*$', front, re.M):
              raise SystemExit('SKILL.md missing expected name')
          if not re.search(r'^description:\s*\S+', front, re.M):
              raise SystemExit('SKILL.md missing description')
          for required in ['references/layout-preservation-notes.md', 'references/pdf2zh-layout-integration.md', 'scripts/paper_pdf_tools.py']:
              if not Path(required).exists():
                  raise SystemExit(f'missing required file: {required}')
          print('skill frontmatter and required files OK')
          PY
